<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>South Indian Meal Planner</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="app">
    <header>
      <h1>🌿 South Indian Meal Planner</h1>
      <p id="session-label"></p>
    </header>
    <div id="chat-box"></div>
    <div id="input-row">
      <input id="user-input" type="text"
        placeholder="e.g. Create a 7-day 1800 kcal weight loss plan"/>
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
